name: Deploy to Production VPS

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests for hotfix'
        required: false
        default: false
        type: boolean

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/smartlife-iot-platform
  DEPLOY_PATH: /var/www/smartlife-iot

jobs:
  build-and-deploy:
    name: Build, Test & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --prefer-offline

      - name: Lint & Test
        if: ${{ github.event.inputs.skip_tests != 'true' }}
        run: |
          npm run lint &
          npm run test:unit &
          wait
        continue-on-error: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          # ✅ GHA cache — fastest option, survives across pushes
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: NODE_ENV=production

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          command_timeout: 5m
          script: |
            set -e
            cd ${{ env.DEPLOY_PATH }}

            # ✅ Async backup — never blocks deploy
            if docker compose -f docker-compose.prod.yml ps postgres | grep -q "Up"; then
              (
                docker compose -f docker-compose.prod.yml exec -T postgres \
                  pg_dump -U smartlife smartlife_iot \
                  > "backups/db-$(date +%Y%m%d-%H%M%S).sql" 2>/dev/null
                ls -t backups/db-*.sql 2>/dev/null | tail -n +6 | xargs -r rm
              ) &
            fi

            echo "📥 Pulling latest image..."
            docker pull ${{ env.IMAGE_NAME }}:latest

            # ✅ Cold start only if infra is down
            INFRA_UP=$(docker compose -f docker-compose.prod.yml ps postgres 2>/dev/null | grep -c "Up" || echo "0")
            if [ "$INFRA_UP" = "0" ]; then
              echo "🏗️ Cold start — bringing up infra..."
              docker compose -f docker-compose.prod.yml up -d postgres redis zookeeper kafka emqx

              timeout 60 sh -c \
                'until docker compose -f docker-compose.prod.yml exec -T postgres \
                  pg_isready -U smartlife 2>/dev/null; do sleep 1; done' &
              timeout 30 sh -c \
                'until docker compose -f docker-compose.prod.yml exec -T redis \
                  redis-cli ping 2>/dev/null | grep -q PONG; do sleep 1; done' &
              wait
              echo "✅ Infra ready"
            else
              echo "✅ Infra already running"
            fi

            echo "🐳 Restarting app container..."
            docker compose -f docker-compose.prod.yml up -d app \
              --no-build --force-recreate

            # ✅ Poll every second — no blind sleep
            echo "⏳ Waiting for health..."
            timeout 90 sh -c \
              'until curl -fsS http://localhost:5000/health > /dev/null 2>&1; \
               do sleep 1; done' \
              && echo "✅ App is healthy!" \
              || {
                echo "❌ Health check failed"
                docker compose -f docker-compose.prod.yml logs --tail=80 app
                exit 1
              }

            echo "🗄️ Running migrations..."
            docker compose -f docker-compose.prod.yml exec -T app \
              npm run migration:run \
              && echo "✅ Migrations done" \
              || echo "⚠️ Migration warning — check output"

            # ✅ Background cleanup
            docker image prune -f &

            echo "✅ Deploy complete!"
            docker compose -f docker-compose.prod.yml ps

  notify:
    name: Notify
    needs: build-and-deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Result
        run: |
          if [ "${{ needs.build-and-deploy.result }}" = "success" ]; then
            echo "✅ Deployment successful!"
            echo "🌐 https://smart-life.sa"
          else
            echo "❌ Deployment failed — check logs"
            exit 1
          fi